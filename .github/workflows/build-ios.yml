name: Build iOS (rolling, SideStore/AltStore)

# Rolling iOS channel. On every push to main it rebuilds the unsigned IPA and
# refreshes the "ios-latest" Release, which hosts the IPA plus the
# SideStore/AltStore source manifest (apps.json). That source URL is stable, so
# AltStore keeps auto-updating as main moves. Versioned, archival releases with
# BOTH the IPA and the Android APK are produced separately by release.yml on a
# v* tag — this rolling channel is what AltStore subscribes to.
#
# macOS runners consume Actions minutes ~10x faster than Linux, so only the
# build runs on macOS; publishing runs on ubuntu.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build-ios.yml'
      - '.github/workflows/build-ios-reusable.yml'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

# Needed to publish the IPA to a GitHub Release (a public, unauthenticated,
# raw direct-download URL that SideStore/AltStore can actually fetch).
permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-ios-reusable.yml
    secrets: inherit

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned IPA
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: ${{ runner.temp }}/ipa

      # Publish the raw .ipa to a rolling "ios-latest" Release plus a
      # SideStore/AltStore source manifest. A Release asset has a stable,
      # public, unauthenticated, direct-download URL — so SideStore/AltStore
      # downloads a real IPA (not GitHub's HTML login page) and install works.
      - name: Publish IPA + SideStore source to the ios-latest Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          IPA="$RUNNER_TEMP/ipa/comical-unsigned.ipa"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/ios-latest"
          SIZE=$(stat -c%s "$IPA")
          DATE=$(date -u +%Y-%m-%d)

          # The reusable build already stamped MARKETING_VERSION as base.run_number
          # (e.g. 0.0.1.42) so both the IPA's CFBundleShortVersionString and this
          # manifest carry the same string — AltStore's version check passes and
          # every push to main yields a strictly higher version than the last.
          FULL_VERSION="${VERSION}"

          # Icon for the source listing, served as a Release asset.
          cp apps/mobile/assets/images/icon.png "$RUNNER_TEMP/icon.png"

          # SideStore/AltStore source manifest. Add this URL as a source:
          #   $BASE/apps.json
          cat > "$RUNNER_TEMP/apps.json" <<EOF
          {
            "name": "Comical",
            "identifier": "com.porksphere.comical.source",
            "apps": [
              {
                "name": "Comical",
                "bundleIdentifier": "com.porksphere.comical",
                "developerName": "porksphere",
                "version": "${FULL_VERSION}",
                "versionDate": "${DATE}",
                "downloadURL": "${BASE}/comical-unsigned.ipa",
                "size": ${SIZE},
                "localizedDescription": "Comical — cross-platform comic reader. Unsigned build; re-signed on-device by SideStore/AltStore with your free Apple ID.",
                "iconURL": "${BASE}/icon.png",
                "tintColor": "208AEF"
              }
            ]
          }
          EOF

          # Recreate the rolling tag/release so the URLs above stay stable.
          gh release delete ios-latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create ios-latest \
            "$IPA" \
            "$RUNNER_TEMP/apps.json" \
            "$RUNNER_TEMP/icon.png" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Comical iOS (latest unsigned IPA)" \
            --notes "Unsigned IPA for SideStore/AltStore (re-signed on-device with your free Apple ID).

          **Install via source (recommended):** add this URL in SideStore/AltStore → Sources → +
          \`${BASE}/apps.json\`

          **Or install the IPA directly:**
          \`${BASE}/comical-unsigned.ipa\`"
