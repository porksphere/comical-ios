name: Build iOS (unsigned IPA for SideStore)

# Produces an UNSIGNED .ipa on a GitHub-hosted macOS runner. No signing certs,
# provisioning profiles, or paid Apple Developer account are involved — SideStore
# re-signs the app on-device with the user's free Apple ID (7-day refresh).
#
# Note: macOS runners consume Actions minutes ~10x faster than Linux. Adjust the
# triggers below if cost is a concern.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build-ios.yml'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

# Needed to publish the IPA to a GitHub Release (a public, unauthenticated,
# raw direct-download URL that SideStore/AltStore can actually fetch).
permissions:
  contents: write

jobs:
  build:
    # macOS 26 provides Xcode 26 / the iOS 26 SDK, required to compile the
    # Liquid Glass (expo-glass-effect) native code.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Bun is the package manager; Node is still required because Metro and the
      # Xcode "Bundle React Native code" phase shell out to `node`.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate native iOS project (CNG)
        run: bunx expo prebuild --platform ios --no-install
        working-directory: apps/mobile

      - name: Install CocoaPods
        run: pod install
        working-directory: apps/mobile/ios

      - name: Build unsigned archive
        working-directory: apps/mobile/ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/comical.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP=$(ls -d "$RUNNER_TEMP/comical.xcarchive/Products/Applications/"*.app | head -1)
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP" "$RUNNER_TEMP/Payload/"
          (cd "$RUNNER_TEMP" && zip -qry comical-unsigned.ipa Payload)

      # Keep the artifact too (handy for debugging / authenticated downloads),
      # but it is NOT the install path — Actions artifacts require a logged-in
      # GitHub session, so an unauthenticated fetch (e.g. from SideStore) gets
      # an HTML login page instead of the IPA. The Release below is the real
      # distribution channel.
      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: comical-ios-unsigned-ipa
          path: ${{ runner.temp }}/comical-unsigned.ipa
          if-no-files-found: error

      # Publish the raw .ipa to a rolling "ios-latest" Release plus a
      # SideStore/AltStore source manifest. A Release asset has a stable,
      # public, unauthenticated, direct-download URL — so SideStore/AltStore
      # downloads a real IPA (not GitHub's HTML login page) and install works.
      - name: Publish IPA + SideStore source to a GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IPA="$RUNNER_TEMP/comical-unsigned.ipa"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/ios-latest"
          SIZE=$(stat -f%z "$IPA")
          VERSION=$(node -p "require('./apps/mobile/app.json').expo.version")
          DATE=$(date -u +%Y-%m-%d)

          # Icon for the source listing, served as a Release asset.
          cp apps/mobile/assets/images/icon.png "$RUNNER_TEMP/icon.png"

          # SideStore/AltStore source manifest. Add this URL as a source:
          #   $BASE/apps.json
          cat > "$RUNNER_TEMP/apps.json" <<EOF
          {
            "name": "Comical",
            "identifier": "com.porksphere.comical.source",
            "apps": [
              {
                "name": "Comical",
                "bundleIdentifier": "com.porksphere.comical",
                "developerName": "porksphere",
                "version": "${VERSION}",
                "versionDate": "${DATE}",
                "downloadURL": "${BASE}/comical-unsigned.ipa",
                "size": ${SIZE},
                "localizedDescription": "Comical — cross-platform comic reader. Unsigned build; re-signed on-device by SideStore/AltStore with your free Apple ID.",
                "iconURL": "${BASE}/icon.png",
                "tintColor": "208AEF"
              }
            ]
          }
          EOF

          # Recreate the rolling tag/release so the URLs above stay stable.
          gh release delete ios-latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create ios-latest \
            "$IPA" \
            "$RUNNER_TEMP/apps.json" \
            "$RUNNER_TEMP/icon.png" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Comical iOS (latest unsigned IPA)" \
            --notes "Unsigned IPA for SideStore/AltStore (re-signed on-device with your free Apple ID).

          **Install via source (recommended):** add this URL in SideStore/AltStore → Sources → +
          \`${BASE}/apps.json\`

          **Or install the IPA directly:**
          \`${BASE}/comical-unsigned.ipa\`"
