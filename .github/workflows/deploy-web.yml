name: Deploy Web (GitHub Pages)

# Builds the Expo app for web (react-native-web) and publishes the static export
# to GitHub Pages. Every branch gets its own live preview that updates on each
# push, so you can open any branch on a phone — no computer in the loop.
#
#   main          -> https://porksphere.github.io/comical-app/
#   other branches-> https://porksphere.github.io/comical-app/branches/<branch>/
#
# How it works: each build is published into a subfolder of the `gh-pages`
# branch (root for main, branches/<slug> for everything else). `keep_files: true`
# means a deploy only touches its own folder, so branches don't clobber each
# other. When a branch is deleted, cleanup-web-branch.yml removes its folder.
#
# ONE-TIME SETUP: in repo Settings -> Pages, set "Build and deployment" Source
# to "Deploy from a branch" and pick the `gh-pages` branch / root. (This replaces
# the old GitHub Actions artifact source.)

on:
  workflow_dispatch:
  push:
    # Run on every branch. Path filters keep it to changes that affect the web
    # bundle, but any commit touching the app re-publishes that branch's preview.
    branches:
      - '**'
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-web.yml'

permissions:
  contents: write

# Serialize deploys: every job pushes to the same gh-pages branch, so running
# them one at a time avoids git push races. We do NOT cancel in-progress runs —
# each branch's deploy must complete (cancelling could drop a branch's update).
concurrency:
  group: deploy-web-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve branch slug, base URL and destination
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # Slugify branch name for use as a URL path segment (e.g. claude/foo -> claude-foo).
          SLUG="$(printf '%s' "$BRANCH" | sed 's#[^A-Za-z0-9._-]#-#g')"
          if [ "$BRANCH" = "main" ]; then
            BASE_URL="/comical-app"
            DEST_DIR=""
            PREVIEW_URL="https://porksphere.github.io/comical-app/"
          else
            BASE_URL="/comical-app/branches/${SLUG}"
            DEST_DIR="branches/${SLUG}"
            PREVIEW_URL="https://porksphere.github.io/comical-app/branches/${SLUG}/"
          fi
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "dest_dir=${DEST_DIR}" >> "$GITHUB_OUTPUT"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export web bundle
        run: bunx expo export --platform web
        working-directory: apps/mobile
        env:
          # Overrides experiments.baseUrl in app.json so assets resolve under the
          # branch's subpath.
          EXPO_BASE_URL: ${{ steps.meta.outputs.base_url }}

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/mobile/dist
          destination_dir: ${{ steps.meta.outputs.dest_dir }}
          # Only touch this branch's own folder; leave other branches' previews intact.
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Deploy web preview for ${{ github.ref_name }} (${{ github.sha }})"

      - name: Publish preview URL to job summary
        if: success()
        env:
          PREVIEW_URL: ${{ steps.meta.outputs.preview_url }}
          BRANCH: ${{ github.ref_name }}
        run: |
          {
            echo "## 🌐 Web preview deployed"
            echo ""
            echo "| Branch | Preview URL |"
            echo "| --- | --- |"
            echo "| \`${BRANCH}\` | **[${PREVIEW_URL}](${PREVIEW_URL})** |"
            echo ""
            echo "> Pages can take ~1 min to update after this run finishes."
          } >> "$GITHUB_STEP_SUMMARY"
          # Also annotate the run so the URL shows in the log without scrolling.
          echo "::notice title=Web preview::${BRANCH} -> ${PREVIEW_URL}"
