name: Build Android APK (reusable)

# Reusable: builds an installable release APK and uploads it as a run artifact
# (renamed to comical-android.apk). Called by both build-android.yml (rolling,
# on push to main) and release.yml (versioned, on a v* tag). The Expo Android
# template signs the release build with the auto-generated debug keystore, so it
# installs directly on any device. Swap in a real upload key before Play Store.

on:
  workflow_call:
    secrets:
      SENTRY_AUTH_TOKEN:
        # Optional: without it, the Sentry Gradle plugin below no-ops (skips
        # sourcemap/debug-symbol upload) rather than failing the build. Not
        # yet configured as a repo secret — see todo.md's Sentry section.
        required: false
    outputs:
      version:
        description: expo.version read from apps/mobile/app.json
        value: ${{ jobs.build.outputs.version }}
      artifact:
        description: Name of the uploaded APK artifact
        value: comical-android-apk

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    # Read by the Sentry Gradle plugin (injected into build.gradle by the Sentry
    # Expo config plugin during `expo prebuild` below) so it can upload
    # sourcemaps/debug symbols during assembleRelease. A missing/empty token
    # makes that step no-op rather than fail.
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Bun is the package manager; Node is still required because Metro and the
      # Gradle "bundle React Native code" phase shell out to `node`.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Generate native Android project (CNG)
        run: bunx expo prebuild --platform android --no-install
        working-directory: apps/mobile

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: apps/mobile/android

      - name: Read app version
        id: meta
        run: echo "version=$(node -p "require('./apps/mobile/app.json').expo.version")" >> "$GITHUB_OUTPUT"

      - name: Collect APK under a stable name
        run: |
          set -euo pipefail
          APK=$(ls apps/mobile/android/app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "$RUNNER_TEMP/comical-android.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: comical-android-apk
          path: ${{ runner.temp }}/comical-android.apk
          if-no-files-found: error
